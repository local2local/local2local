name: L2LAAF Multi-Project Deployment

on:
  push:
    branches:
      - main      # Deploys to Prod
      - staging   # Deploys to Staging
      - develop   # Deploys to Dev

# Opt into Node.js 24 for all actions to resolve deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for Cloud Functions)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Setup Flutter (for Web App)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.32.6' 

      - name: Install Dependencies
        run: |
          cd functions && npm install
          cd ..
          flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set Environment & Deploy
        run: |
          # Install Firebase CLI
          npm install -g firebase-tools
          
          # Map branches to Firebase Project IDs
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            PROJECT_ID="local2local-prod"
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            PROJECT_ID="local2local-staging"
          else
            PROJECT_ID="local2local-dev"
          fi
          
          echo "Deploying to $PROJECT_ID..."
          
          # 1. Switch the CLI context to the target project
          firebase use $PROJECT_ID --non-interactive
          
          # 2. Deploy with --force to allow deletion of legacy Dreamflow functions
          # This is required for the initial migration to the L2LAAF architecture
          firebase deploy --only hosting,functions --project $PROJECT_ID --non-interactive --force