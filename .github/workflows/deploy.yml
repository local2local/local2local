name: L2LAAF Multi-Project Deployment

on:
  push:
    branches:
      - main      # Targets Production
      - staging   # Targets Staging
      - develop   # Targets Development

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'staging' && 'Staging') || 'Development' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate JSON Key Format
        run: |
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "ERROR: GCP_SA_KEY is empty. Check your GitHub Environment Secrets."
            exit 1
          fi
          # Attempt to parse the secret as JSON to catch copy-paste corruption
          echo '${{ secrets.GCP_SA_KEY }}' | jq . > /dev/null || (echo "ERROR: GCP_SA_KEY is not valid JSON. You likely missed a bracket or character during copy-paste." && exit 1)
          echo "SUCCESS: JSON Key format is valid."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.32.6'

      - name: Install Dependencies
        run: |
          cd functions && npm install
          cd ..
          flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Set Environment & Deploy
        env:
          # Automatically uses the file path generated by the auth step
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
          CI: true
        run: |
          # 1. Map branch to specific GCP Project ID
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            PROJECT_ID="local2local-prod"
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            PROJECT_ID="local2local-staging"
          else
            PROJECT_ID="local2local-dev"
          fi
          
          echo "Deploying to $PROJECT_ID using Service Account Path..."
          
          # 2. Execute Deployment
          # We use --debug to see the full handshake if it fails again
          firebase deploy --only hosting,functions --project $PROJECT_ID --non-interactive --force --debug