name: L2LAAF Multi-Project Deployment
on:
  push:
    branches: [ main, staging, develop ]
    paths-ignore:
      - '.l2laaf/state.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'staging' && 'Staging') || 'Development' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.5'

      - name: Install Dependencies
        run: |
          cd functions && npm install
          cd ..
          flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Check Secret Presence
        run: |
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "❌ FATAL: GCP_SA_KEY is empty."
            exit 1
          else
            echo "✅ GCP_SA_KEY detected."
          fi

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy Stack
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            PROJECT_ID="local2local-prod"
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            PROJECT_ID="local2local-staging"
          else
            PROJECT_ID="local2local-dev"
          fi
          npx firebase-tools deploy --only hosting,functions --project $PROJECT_ID --non-interactive --force

      - name: Notify Orchestrator (Telemetry Link)
        if: success()
        run: |
          PHASE="37.7.6" 
          SUMMARY=$(git log -1 --pretty=%B | tr -d '\n' | tr '"' "'")
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"incoming_phase\": \"$PHASE\",
            \"build_id\": \"${{ github.run_id }}\",
            \"summary\": \"$SUMMARY\",
            \"event\": \"DEPLOYMENT_COMPLETE\",
            \"env\": \"${{ (github.ref_name == 'main' && 'prod') || (github.ref_name == 'staging' && 'staging') || 'dev' }}\"
          }"