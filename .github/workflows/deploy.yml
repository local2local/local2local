name: L2LAAF Multi-Project Deployment
on:
  push:
    branches: [ main, develop ]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || 'Development' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.5'
          
      - name: Install Firebase CLI & Dependencies
        run: |
          npm install -g firebase-tools
          cd functions 
          npm install firebase-functions@latest firebase-admin@latest
          npm install
          cd ..
          flutter pub get
          
      - name: Build Flutter Web
        run: flutter build web --release
        
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          
      - name: Deploy Stack
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            PROJECT_ID="local2local-prod"
          else
            PROJECT_ID="local2local-dev"
          fi
          firebase deploy --only hosting,functions --project $PROJECT_ID --non-interactive --force
          
      - name: Deploy n8n Workflow
        if: success()
        env:
          N8N_KEY: ${{ secrets.N8N_API_KEY }}
          N8N_ID: ${{ secrets.N8N_WORKFLOW_ID }}
        run: |
          WORKFLOW_FILE="n8n_workflows/n8n_workflow.json"
          if [ -f "$WORKFLOW_FILE" ]; then
            echo "Deploying $WORKFLOW_FILE to n8n Cloud..."
            if [ -z "$N8N_KEY" ] || [ -z "$N8N_ID" ]; then
              echo "⚠️ N8N_API_KEY or N8N_WORKFLOW_ID secret is missing or empty. Skipping API sync."
            else
              # STEP 1: Explicitly deactivate workflow to flush n8n Express routing table
              echo "Deactivating workflow $N8N_ID to clear routing table..."
              curl -s --max-time 15 -X POST "https://local2local.app.n8n.cloud/api/v1/workflows/$N8N_ID/deactivate" \
                -H "X-N8N-API-KEY: $N8N_KEY" \
                -H "Accept: application/json" > /dev/null

              # STEP 2: Upload new JSON
              jq 'del(.meta, .active, .id, .createdAt, .updatedAt)' "$WORKFLOW_FILE" > sanitized_workflow.json
              
              RESPONSE=$(curl -s --max-time 15 -w "\n%{http_code}" -X PUT "https://local2local.app.n8n.cloud/api/v1/workflows/$N8N_ID" \
                -H "X-N8N-API-KEY: $N8N_KEY" \
                -H "Accept: application/json" \
                -H "Content-Type: application/json" \
                -d @sanitized_workflow.json)
              
              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              
              if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
                echo "🟢 Successfully deployed workflow to n8n!"
                
                # STEP 3: Reactivate workflow to cleanly mount the new webhooks
                echo "Activating workflow $N8N_ID..."
                ACT_RESPONSE=$(curl -s --max-time 15 -w "\n%{http_code}" -X POST "https://local2local.app.n8n.cloud/api/v1/workflows/$N8N_ID/activate" \
                  -H "X-N8N-API-KEY: $N8N_KEY" \
                  -H "Accept: application/json")
                ACT_CODE=$(echo "$ACT_RESPONSE" | tail -n1)
                
                if [[ "$ACT_CODE" -ge 200 && "$ACT_CODE" -lt 300 ]]; then
                  echo "🟢 Successfully activated workflow! Waiting 10 seconds for n8n routing table to mount..."
                  sleep 10
                else
                  echo "⚠️ Failed to activate workflow. HTTP Code: $ACT_CODE."
                fi
              else
                echo "❌ Failed to deploy to n8n. HTTP Code: $HTTP_CODE"
                exit 1
              fi
            fi
          else
            echo "⚠️ n8n_workflows/n8n_workflow.json not found. Skipping."
          fi

      - name: Notify Orchestrator
        if: success()
        run: |
          PHASE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('.l2laaf/state.json')).current_phase)")
          ENV_NAME="${{ (github.ref_name == 'main' && 'prod') || 'dev' }}"
          
          jq -n \
            --arg phase "$PHASE" \
            --arg build "${{ github.run_id }}" \
            --arg summary "$(git log -1 --pretty=%B | head -n 1)" \
            --arg env "$ENV_NAME" \
            '{incoming_phase: $phase, build_id: $build, summary: $summary, event: "DEPLOYMENT_COMPLETE", env: $env}' > n8n_payload.json
            
          echo "Firing Webhook with payload:"
          cat n8n_payload.json
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d @n8n_payload.json)
          
          echo "n8n Webhook Response Code: $HTTP_CODE"
          
          if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
            echo "🟢 Webhook successfully received by n8n!"
          else
            echo "❌ Webhook failed! n8n returned $HTTP_CODE. The webhook may be inactive or offline."
            exit 1
          fi