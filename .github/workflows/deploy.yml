name: L2LAAF Multi-Project Deployment
on:
  push:
    branches: [ main, develop ]
    paths-ignore: [ '.l2laaf/state.json' ]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || 'Development' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.5'
      - name: Install Dependencies
        run: |
          cd functions && npm install
          cd ..
          flutter pub get
      - name: Build Flutter Web
        run: flutter build web --release
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Deploy Stack
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            PROJECT_ID="local2local-prod"
          else
            PROJECT_ID="local2local-dev"
          fi
          npx firebase-tools deploy --only hosting,functions --project $PROJECT_ID --non-interactive --force
          
      - name: Deploy n8n Workflow
        if: success()
        env:
          N8N_KEY: ${{ secrets.N8N_API_KEY }}
          N8N_ID: ${{ secrets.N8N_WORKFLOW_ID }}
        run: |
          if [ -d "n8n_workflows" ]; then
            WORKFLOW_FILE=$(ls -t n8n_workflows/*.json 2>/dev/null | head -n 1)
            if [ -n "$WORKFLOW_FILE" ]; then
              echo "Deploying $WORKFLOW_FILE to n8n Cloud..."
              if [ -z "$N8N_KEY" ] || [ -z "$N8N_ID" ]; then
                echo "⚠️ N8N_API_KEY or N8N_WORKFLOW_ID secret is missing or empty. Skipping API sync."
              else
                RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT "https://local2local.app.n8n.cloud/api/v1/workflows/$N8N_ID" \
                  -H "X-N8N-API-KEY: $N8N_KEY" \
                  -H "Content-Type: application/json" \
                  -d @"$WORKFLOW_FILE")
                
                HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
                BODY=$(echo "$RESPONSE" | sed '$d')
                
                if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
                  echo "🟢 Successfully deployed workflow to n8n!"
                else
                  echo "❌ Failed to deploy to n8n. HTTP Code: $HTTP_CODE"
                  echo "Response body: $BODY"
                  exit 1
                fi
              fi
            fi
          fi

      - name: Notify Orchestrator
        if: success()
        run: |
          PHASE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('.l2laaf/state.json')).current_phase)")
          SUMMARY=$(git log -1 --pretty=%B | tr -d '\n' | tr '"' "'")
          ENV_NAME="${{ (github.ref_name == 'main' && 'prod') || 'dev' }}"
          cat <<EOF > n8n_payload.json
          {
            "incoming_phase": "$PHASE",
            "build_id": "${{ github.run_id }}",
            "summary": "$SUMMARY",
            "event": "DEPLOYMENT_COMPLETE",
            "env": "$ENV_NAME"
          }
          EOF
          RESPONSE=$(curl -s -w "%{http_code}" -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d @n8n_payload.json)
          echo "n8n Response Code: ${RESPONSE: -3}"