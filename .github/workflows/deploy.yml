name: L2LAAF Multi-Project Deployment
on:
  push:
    branches: [ main, develop ]
    paths-ignore: [ '.l2laaf/state.json' ]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || 'Development' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.5'
      - name: Install Dependencies
        run: |
          cd functions && npm install
          cd ..
          flutter pub get
      - name: Build Flutter Web
        run: flutter build web --release
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Deploy Stack
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            PROJECT_ID="local2local-prod"
          else
            PROJECT_ID="local2local-dev"
          fi
          npx firebase-tools deploy --only hosting,functions --project $PROJECT_ID --non-interactive --force
      - name: Notify Orchestrator
        if: success()
        run: |
          PHASE="41.0.9"
          SUMMARY=$(git log -1 --pretty=%B | tr -d '\n' | tr '"' "'")
          ENV_NAME="${{ (github.ref_name == 'main' && 'prod') || 'dev' }}"
          cat <<EOF > n8n_payload.json
          {
            "incoming_phase": "$PHASE",
            "build_id": "${{ github.run_id }}",
            "summary": "$SUMMARY",
            "event": "DEPLOYMENT_COMPLETE",
            "env": "$ENV_NAME"
          }
          EOF
          RESPONSE=$(curl -s -w "%{http_code}" -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d @n8n_payload.json)
          echo "n8n Response Code: ${RESPONSE: -3}"