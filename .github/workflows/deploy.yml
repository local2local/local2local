name: L2LAAF Multi-Project Deployment

on:
  push:
    branches:
      - main      # Targets Production
      - staging   # Targets Staging
      - develop   # Targets Development

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Map the branch to the GitHub Environment (Case-sensitive)
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'staging' && 'Staging') || 'Development' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Environment Probe
        run: |
          echo "Branch Name: ${{ github.ref_name }}"
          echo "Calculated Env: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'staging' && 'Staging') || 'Development' }}"
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "CRITICAL: GCP_SA_KEY is EMPTY. GitHub Environment mapping failed."
            exit 1
          else
            echo "SUCCESS: GCP_SA_KEY is populated."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.32.6'

      - name: Install Dependencies
        run: |
          cd functions && npm install
          cd ..
          flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # This pulls the JSON key from the active Environment context
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set Environment & Deploy
        run: |
          npm install -g firebase-tools
          
          # Map branch to specific GCP Project ID
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            PROJECT_ID="local2local-prod"
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            PROJECT_ID="local2local-staging"
          else
            PROJECT_ID="local2local-dev"
          fi
          
          firebase use $PROJECT_ID --non-interactive
          firebase deploy --only hosting,functions --project $PROJECT_ID --non-interactive --force