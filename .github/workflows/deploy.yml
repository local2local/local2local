name: L2LAAF Multi-Project Deployment

on:
  push:
    branches:
      - main      # Targets Production
      - staging   # Targets Staging
      - develop   # Targets Development

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'staging' && 'Staging') || 'Development' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.32.6'

      - name: Install Dependencies
        run: |
          cd functions && npm install
          cd ..
          flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Set Environment & Deploy
        env:
          # The "Gold Standard" fix: Use the JSON key as the FIREBASE_TOKEN
          # Firebase CLI will automatically use this for authentication
          FIREBASE_TOKEN: ${{ secrets.GCP_SA_KEY }}
          CI: true
        run: |
          # 1. Map branch to specific GCP Project ID
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            PROJECT_ID="local2local-prod"
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            PROJECT_ID="local2local-staging"
          else
            PROJECT_ID="local2local-dev"
          fi
          
          echo "Deploying to $PROJECT_ID using Service Account Token..."
          
          # 2. Execute Deployment
          # We pass the project ID directly. The FIREBASE_TOKEN env var handles auth.
          firebase deploy --only hosting,functions --project $PROJECT_ID --non-interactive --force