name: L2LADF Multi-Project Deployment

on:
  push:
    branches: [ main, staging, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.ref_name == 'main' && 'Production') || (github.ref_name == 'staging' && 'Staging') || 'Development' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.5'

      - name: Install Dependencies
        run: |
          cd functions && npm install
          cd ..
          flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Target Project
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            PROJECT_ID="local2local-prod"
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            PROJECT_ID="local2local-staging"
          else
            PROJECT_ID="local2local-dev"
          fi
          firebase deploy --only functions:onProposalFinalized,functions:forceBaseline --project $PROJECT_ID --non-interactive --force
