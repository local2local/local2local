<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <title>L2LAAF Cockpit</title>
  
  <!-- Firebase SDKs: Dreamflow Standard -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="/__/firebase/init.js"></script>

  <script>
    window.L2LAAF_VERSION = "v11.71.36";
    console.log("L2LAAF_BOOT_INFO: " + window.L2LAAF_VERSION);
    
    function startFlutter() {
      // Ensure firebase is initialized before loading flutter
      if (typeof firebase !== 'undefined' && firebase.apps.length > 0) {
        console.log("L2LAAF_BOOT: Firebase JS Ready. Launching Engine...");
        const script = document.createElement('script');
        script.src = "flutter_bootstrap.js";
        document.body.appendChild(script);
      } else {
        console.warn("L2LAAF_BOOT: Waiting for Firebase init.js...");
        setTimeout(startFlutter, 100);
      }
    }
  </script>
</head>
<body onload="startFlutter()">
</body>
</html>
