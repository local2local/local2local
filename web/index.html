<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <title>L2LAAF Cockpit</title>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="/__/firebase/init.js"></script>

  <script>
    window.L2LAAF_VERSION = "v11.73.36";
    console.log("L2LAAF_BOOT_INFO: " + window.L2LAAF_VERSION);
    
    function startApp() {
      // Wait for Firebase JS to be initialized by init.js before starting Flutter
      if (typeof firebase !== 'undefined' && firebase.apps.length > 0) {
        console.log("L2LAAF_BOOT: Firebase Config found. Injecting Bootstrap...");
        const script = document.createElement('script');
        script.src = "flutter_bootstrap.js";
        document.body.appendChild(script);
      } else {
        console.warn("L2LAAF_BOOT: Waiting for Firebase JS Handshake...");
        setTimeout(startApp, 100);
      }
    }
  </script>
</head>
<body onload="startApp()">
</body>
</html>
