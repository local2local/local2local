name: local2local
description: "A new Flutter project."
publish_to: "none"

version: 43.1.49+552

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0
  flutter_riverpod: ^3.0.0-dev.0
  google_fonts: ^6.1.0
  go_router: ^16.2.0
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.1
